name: Reusable build

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to checkout and build'
        required: true
        type: string
        default: 'main'
      upload-artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            build-script: build:win
          - os: macos-latest
            build-script: build:mac
          - os: ubuntu-latest
            build-script: build:linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout specific branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}  # Use the branch input
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build for ${{ matrix.os }}
        run: npm run ${{ matrix.build-script }}

      - name: Upload artifacts (if requested)
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifacts-${{ inputs.branch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
            !dist/win-ia32-unpacked
            !dist/win-unpacked
            !dist/mac
            !dist/linux-unpacked
          if-no-files-found: ignore
          retention-days: 7