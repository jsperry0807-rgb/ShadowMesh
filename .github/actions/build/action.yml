name: 'Build Electron app'
description: 'Install dependencies, build, and optionally upload artifacts'
inputs:
  build-script:
    description: 'npm script to run for the current platform'
    required: true
  upload-artifacts:
    description: 'Whether to upload build artifacts'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Build the app
      run: npm run ${{ inputs.build-script }}
      shell: bash

    - name: Upload artifacts (if requested)
      if: ${{ inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-artifacts
        path: |
          dist/*.exe
          dist/*.dmg
          dist/*.AppImage
          dist/*.deb
          dist/*.rpm
          dist/*.zip
          !dist/win-ia32-unpacked
          !dist/win-unpacked
          !dist/mac
          !dist/linux-unpacked
        if-no-files-found: ignore
